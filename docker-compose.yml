version: "3.9"

services:
  bugtracker:
    build:
      context: .
      dockerfile: Dockerfile
    image: bugtracker:latest
    container_name: bugtracker
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Development mode (hot reload)
  bugtracker-dev:
    image: node:18-alpine
    container_name: bugtracker-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install --legacy-peer-deps && npm start"
    profiles:
      - dev
