---
# ─── ImageStream ──────────────────────────────────────────────────────────────
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: bugtracker
  labels:
    app: bugtracker

---
# ─── BuildConfig (Docker strategy) ───────────────────────────────────────────
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: bugtracker
  labels:
    app: bugtracker
spec:
  source:
    type: Git
    git:
      uri: https://github.com/THENOID-404/Bug-Tracker.git  # ← Update this
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: "bugtracker:latest"
  triggers:
    - type: ConfigChange
    - type: GitHub
      github:
        secret: abc123       # ← Update this
